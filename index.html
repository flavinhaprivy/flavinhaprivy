<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plataforma Umpierre | Grupo VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="glass-card">
            <header>
                <div class="brand">UMPIERRE VIP</div>
                <h1>Escolha seu Plano</h1>
                <p>Garanta sua vaga no grupo exclusivo do Telegram.</p>
            </header>

            <div class="plans-container">
                <div class="plan-card active" data-price="19.90" data-name="SEMANAL">
                    <span class="plan-title">SEMANAL</span>
                    <span class="plan-price">R$ 19,90</span>
                </div>
                <div class="plan-card" data-price="99.90" data-name="MENSAL">
                    <span class="plan-title">MENSAL</span>
                    <span class="plan-price">R$ 99,90</span>
                </div>
                <div class="plan-card" data-price="399.90" data-name="VITALÍCIO">
                    <span class="plan-title">VITALÍCIO</span>
                    <span class="plan-price">R$ 399,90</span>
                </div>
            </div>

            <section id="formArea">
                <div class="input-group">
                    <label>Seu melhor e-mail</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" required>
                </div>
                <button id="btnAssinar">GERAR PIX DE ACESSO</button>
            </section>

            <section id="pixArea" style="display: none;">
                <p class="pix-success">✅ Tudo pronto! Pague o Pix abaixo:</p>
                <div class="pix-display">
                    <input type="text" id="pixCode" readonly>
                    <button id="btnCopy">COPIAR</button>
                </div>
                <p class="pix-footer">Após o pagamento, o link do Telegram será enviado ao seu e-mail.</p>
            </section>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
