<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Umpierre | Acesso Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="hero">
        <div class="glass-card">
            <div class="logo">UMPIERRE</div>
            <h1>Acesso à Plataforma Premium</h1>
            <p>Garanta sua assinatura agora e libere todas as ferramentas de automação e segurança.</p>
            
            <div class="price-tag">
                <span>Apenas</span>
                <div class="price">R$ 50,00</div>
                <span>por mês</span>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Digite seu e-mail para começar">
                <button id="btnAssinar">ASSINAR AGORA</button>
            </div>

            <div class="features">
                <div class="feature">✅ Ativação Imediata via Pix</div>
                <div class="feature">✅ Suporte 24h</div>
                <div class="feature">✅ Acesso Total</div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
