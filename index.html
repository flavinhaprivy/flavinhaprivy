<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Privada UMPIERRE</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #0ea5e9;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
        }
        .container { 
            max-width: 450px; 
            padding: 40px; 
            border: 1px solid #334155; 
            border-radius: 16px; 
            background: var(--bg-card); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }
        h1 { 
            color: var(--primary); 
            font-size: 1.8rem; 
            letter-spacing: 1px; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p { color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; }
        
        .cta-button { 
            display: inline-block; 
            padding: 16px 32px; 
            background-color: var(--primary); 
            color: var(--bg-deep); 
            border-radius: 8px; 
            font-weight: 800; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cta-button:hover { 
            background-color: var(--accent);
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        .cta-button:disabled { 
            background-color: #64748b; 
            cursor: not-allowed; 
            transform: none;
        }
        footer { margin-top: 40px; font-size: 0.8rem; color: #64748b; }
        .footer-text { margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PLATAFORMA UMPIERRE</h1>
        <p>Acesso exclusivo aos sistemas Nexus e automações de segurança industrial.</p>
        
        <button id="btnAssinar" class="cta-button">ASSINAR AGORA</button>

        <footer>
            <span class="footer-text">&copy; <span id="year"></span> Eduardo Umpierre</span>
            <span>Bagé/RS - Segurança & Automação</span>
        </footer>
    </div>

    <script>
        // 1. Atualiza o ano automaticamente
        document.getElementById('year').textContent = new Date().getFullYear();

        const btn = document.getElementById('btnAssinar');

        btn.addEventListener('click', async () => {
            // Feedback visual imediato
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            const dadosVenda = {
                produto: "Assinatura Nexus",
                origem: "Web_App",
                data: new Date().toISOString()
            };

            try {
                // Endpoint do n8n rodando no seu Debian via Localtunnel
                const response = await fetch('https://eight-cameras-lose.loca.lt/webhook/venda', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true' 
                    },
                    mode: 'cors', 
                    body: JSON.stringify(dadosVenda)
                });

                if (!response.ok) {
                    throw new Error("O servidor Nexus não respondeu corretamente.");
                }

                const resultado = await response.json();

                // Lógica de redirecionamento
                if (resultado.url_checkout) {
                    window.location.href = resultado.url_checkout;
                } else {
                    alert("Atenção: Link de pagamento não gerado. Verifique o fluxo no n8n.");
                    resetBtn();
                }

            } catch (error) {
                console.error("Erro na integração:", error);
                alert("Falha na conexão com o servidor Nexus.\n\nVerifique se o sistema no Debian está online ou tente novamente em instantes.");
                resetBtn();
            }
        });

        function resetBtn() {
            btn.innerText = "ASSINAR AGORA";
            btn.disabled = false;
        }
    </script>
</body>
</html>
