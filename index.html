<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Plataforma Umpierre | Acesso Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-animate"></div>

    <main class="container">
        <div class="glass-card">
            <header>
                <div class="brand">UMPIERRE</div>
                <h1>Acesso Premium</h1>
                <p>Entre para a elite da automação. Assine agora e receba o seu acesso instantaneamente via Pix.</p>
            </header>

            <section class="pricing">
                <div class="price-box">
                    <span class="currency">R$</span>
                    <span class="value">50</span>
                    <span class="period">/mês</span>
                </div>
            </section>

            <section class="form-area" id="formArea">
                <div class="input-group">
                    <label for="email">E-mail de Cadastro</label>
                    <input type="email" id="email" placeholder="seu-email@exemplo.com" required>
                </div>
                <button id="btnAssinar">GERAR PAGAMENTO PIX</button>
            </section>

            <section class="pix-area" id="pixArea" style="display: none;">
                <p class="pix-instruction">✅ Código Pix gerado!</p>
                <div class="pix-display">
                    <input type="text" id="pixCode" readonly aria-label="Código Pix Copia e Cola">
                    <button id="btnCopy">COPIAR</button>
                </div>
                <p class="pix-footer">Abra o app do seu banco e escolha a opção <strong>"Pix Copia e Cola"</strong>.</p>
            </section>

            <footer class="benefits">
                <span>🛡️ Seguro</span>
                <span>⚡ Instantâneo</span>
                <span>📱 Mobile Ready</span>
            </footer>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
