<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plataforma Umpierre | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="glass-card">
            <header>
                <div class="brand">UMPIERRE</div>
                <h1>Acesso Premium</h1>
                <p>Assine agora e receba o seu acesso instantaneamente via Pix.</p>
            </header>

            <section class="price-box">
                <span class="value">R$ 50</span><span class="period">/mês</span>
            </section>

            <section id="formArea">
                <input type="email" id="email" placeholder="seu-email@exemplo.com" required>
                <button id="btnAssinar">GERAR PAGAMENTO PIX</button>
            </section>

            <section id="pixArea" style="display: none;">
                <p>✅ Pix Copia e Cola gerado!</p>
                <div class="pix-display">
                    <input type="text" id="pixCode" readonly>
                    <button id="btnCopy">COPIAR</button>
                </div>
            </section>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
</html>
